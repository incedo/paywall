apiVersion: v1
kind: Service
metadata:
  name: mailslurper
  namespace: paywall-dev
  labels:
    app: mailslurper
spec:
  type: ClusterIP
  selector:
    app: mailslurper
  ports:
    - name: ui
      port: 4436
      targetPort: 4436
      protocol: TCP
    - name: smtp
      port: 1025
      targetPort: 1025
      protocol: TCP
