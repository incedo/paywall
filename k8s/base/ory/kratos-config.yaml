---
# Identity schema for Kratos
apiVersion: v1
kind: ConfigMap
metadata:
  name: kratos-identity-schema
  namespace: paywall-dev
data:
  identity.schema.json: |
    {
      "$id": "https://schemas.ory.sh/presets/kratos/identity.email.schema.json",
      "$schema": "http://json-schema.org/draft-07/schema#",
      "title": "PaywallIdentity",
      "type": "object",
      "properties": {
        "traits": {
          "type": "object",
          "properties": {
            "email": {
              "type": "string",
              "format": "email",
              "title": "Email",
              "ory.sh/kratos": {
                "credentials": {"password": {"identifier": true}},
                "recovery": {"via": "email"},
                "verification": {"via": "email"}
              }
            },
            "name": {
              "type": "object",
              "properties": {
                "first": {"type": "string", "title": "First Name"},
                "last": {"type": "string", "title": "Last Name"}
              }
            }
          },
          "required": ["email"]
        }
      },
      "additionalProperties": false
    }
---
# Main Kratos configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: kratos-config
  namespace: paywall-dev
data:
  kratos.yaml: |
    version: v0.13.0

    dsn: postgres://paywall:paywall_dev@postgres:5432/kratos?sslmode=disable

    serve:
      public:
        base_url: http://id.paywall.local
        cors:
          enabled: true
          allowed_origins:
            - http://paywall.local
            - http://id.paywall.local
            - http://login.paywall.local
      admin:
        base_url: http://kratos:4434

    selfservice:
      default_browser_return_url: http://paywall.local/
      allowed_return_urls:
        - http://paywall.local
        - http://login.paywall.local

      methods:
        password:
          enabled: true
        link:
          enabled: true

      flows:
        error:
          ui_url: http://login.paywall.local/error
        settings:
          ui_url: http://login.paywall.local/settings
          privileged_session_max_age: 15m
        recovery:
          enabled: true
          ui_url: http://login.paywall.local/recovery
        verification:
          enabled: true
          ui_url: http://login.paywall.local/verification
          after:
            default_browser_return_url: http://login.paywall.local/
        logout:
          after:
            default_browser_return_url: http://login.paywall.local/login
        login:
          ui_url: http://login.paywall.local/login
          lifespan: 10m
        registration:
          lifespan: 10m
          ui_url: http://login.paywall.local/registration
          after:
            password:
              hooks:
                - hook: session

    log:
      level: info
      format: text
      leak_sensitive_values: false

    secrets:
      cookie:
        - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE
      cipher:
        - 32-LONG-SECRET-NOT-SECURE-AT-ALL!!

    ciphers:
      algorithm: xchacha20-poly1305

    hashers:
      algorithm: bcrypt
      bcrypt:
        cost: 8

    identity:
      default_schema_id: default
      schemas:
        - id: default
          url: file:///etc/kratos/identity.schema.json

    courier:
      smtp:
        connection_uri: smtps://test:test@mailslurper:1025/?skip_ssl_verify=true
        from_address: no-reply@paywall.local
        from_name: Paywall

    session:
      cookie:
        domain: paywall.local
        same_site: Lax
      lifespan: 720h
