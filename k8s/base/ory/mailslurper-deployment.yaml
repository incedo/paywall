apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailslurper
  namespace: paywall-dev
  labels:
    app: mailslurper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mailslurper
  template:
    metadata:
      labels:
        app: mailslurper
    spec:
      containers:
        - name: mailslurper
          image: oryd/mailslurper:latest-smtps
          ports:
            - name: ui
              containerPort: 4436
            - name: smtp
              containerPort: 1025
          readinessProbe:
            tcpSocket:
              port: 4436
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
