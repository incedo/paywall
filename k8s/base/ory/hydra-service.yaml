apiVersion: v1
kind: Service
metadata:
  name: hydra
  namespace: paywall-dev
  labels:
    app: hydra
spec:
  type: ClusterIP
  selector:
    app: hydra
  ports:
    - name: public
      port: 4444
      targetPort: 4444
      protocol: TCP
    - name: admin
      port: 4445
      targetPort: 4445
      protocol: TCP
